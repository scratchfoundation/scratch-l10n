name: Daily Help Update

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  schedule:
    # daily-help-update (e.g., daily at 5 AM UTC)
    - cron: '0 5 * * *'

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

permissions:
  contents: write # publish a GitHub release
  pages: write # deploy to GitHub Pages
  issues: write # comment on released issues
  pull-requests: write # comment on released pull requests

jobs:
  daily-help-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: |
          npm ci
          npx browserslist@latest --update-db

      - name: Sync help
        env:
          # Organization-wide secrets
          FRESHDESK_TOKEN: ${{ secrets.FRESHDESK_TOKEN }}
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
          WARNINGS_FILE: ${{ runner.temp }}/sync-help-warnings.txt
        run: npm run sync:help

      - name: Check for warnings
        id: check-warnings
        if: success()
        run: |
          if [ -s "${{ runner.temp }}/sync-help-warnings.txt" ]; then
            echo "has_warnings=true" >> $GITHUB_OUTPUT
            echo "### Sync Help Warnings" >> $GITHUB_STEP_SUMMARY
            cat "${{ runner.temp }}/sync-help-warnings.txt" >> $GITHUB_STEP_SUMMARY
          fi

      - uses: ./.github/actions/report-scheduled-issue
        if: steps.check-warnings.outputs.has_warnings == 'true' && github.event_name == 'schedule'
        with:
          slack-webhook: ${{ secrets.SLACK_WEBHOOK_ENGINEERING }}
          event: has warnings

      - uses: ./.github/actions/report-scheduled-issue
        if: failure() && github.event_name == 'schedule'
        with:
          slack-webhook: ${{ secrets.SLACK_WEBHOOK_ENGINEERING }}
          event: failed
